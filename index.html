<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Transformations | Portal</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <!-- Styling CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase Compat SDKs (Essential for single-file HTML to avoid 'require' errors) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #070e24; font-family: 'Urbanist', sans-serif; margin: 0; overflow-x: hidden; color: white; }
        .font-lora { font-family: 'Lora', serif; }
        .font-urbanist { font-family: 'Urbanist', sans-serif; }
        
        /* Strategic Transformations Hexagon Branding */
        .hex { clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); }
        
        /* UI Effects */
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glow-teal { box-shadow: 0 0 25px rgba(45, 212, 191, 0.15); }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #070e24; }
        ::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 10px; }

        @media print { .no-print { display: none !important; } body { background: white !important; color: black !important; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- 1. CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyBG4228evDP211fvJv1LMSt0AZ8a8kj31c", 
            authDomain: "unmask-audit-2026.firebaseapp.com",
            projectId: "unmask-audit-2026",
            storageBucket: "unmask-audit-2026.firebasestorage.app",
            messagingSenderId: "94518937589",
            appId: "1:94518937589:web:a484d36bf7a11ffe9a82bc"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const { useState, useEffect } = React;

        // --- COMPONENTS ---

        const BrandLogo = ({ size = "md" }) => {
            const containerClass = size === "lg" ? "scale-[1.6] mb-24" : "scale-75";
            const hexSize = "w-6 h-6";
            return (
                <div className={`relative flex items-center justify-center ${containerClass}`}>
                    <div className="relative w-12 h-12">
                        {/* Top Teal */}
                        <div className={`${hexSize} bg-teal-400 hex absolute top-0 left-1/2 -translate-x-1/2 z-20 shadow-[0_0_15px_rgba(45,212,191,0.5)]`} />
                        {/* Left Purple */}
                        <div className={`${hexSize} bg-purple-600 hex absolute top-4 left-0 z-10`} />
                        {/* Right Outline */}
                        <div className={`${hexSize} bg-slate-400 hex absolute top-4 right-0 flex items-center justify-center p-[2px] z-10`}>
                            <div className="w-full h-full bg-[#070e24] hex" />
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [loading, setLoading] = useState(true);
            const [auditData, setAuditData] = useState(null);
            const [error, setError] = useState(null);
            const [inputValue, setInputValue] = useState('');
            const [auditId, setAuditId] = useState(new URLSearchParams(window.location.search).get('id'));

            useEffect(() => {
                const init = async () => {
                    auth.onAuthStateChanged(async (user) => {
                        if (!user) await auth.signInAnonymously().catch(console.error);
                        
                        if (auditId) {
                            // Path matching your Firestore screenshot exactly
                            const path = `artifacts/unmask-audit-2026/public/data/structural_audits/${auditId.trim().toUpperCase()}`;
                            
                            const unsubscribe = db.doc(path).onSnapshot((snap) => {
                                if (snap.exists) {
                                    setAuditData(snap.data());
                                    setError(null);
                                } else {
                                    setError(`ID_NOT_FOUND: Record "${auditId}" not found in diagnostic stream.`);
                                }
                                setLoading(false);
                            }, (err) => {
                                setError(`ACCESS_DENIED: Firebase Security Handshake failed. Check Authorized Domains.`);
                                setLoading(false);
                            });
                            return () => unsubscribe();
                        } else {
                            setLoading(false);
                        }
                    });
                };
                init();
            }, [auditId]);

            const handleAuthenticate = () => {
                if (inputValue.trim()) {
                    const id = inputValue.trim().toUpperCase();
                    window.location.search = `?id=${id}`;
                }
            };

            if (loading) return (
                <div className="min-h-screen bg-[#070e24] flex items-center justify-center">
                    <div className="w-10 h-10 border-2 border-teal-500/20 border-t-teal-500 rounded-full animate-spin"></div>
                </div>
            );

            // --- ENTRY PORTAL VIEW ---
            if (!auditId || error) {
                return (
                    <div className="min-h-screen bg-[#070e24] flex flex-col items-center justify-center p-8 text-center font-urbanist">
                        <BrandLogo size="lg" />
                        
                        <div className="max-w-2xl w-full">
                            <h2 className="text-4xl lg:text-5xl font-lora text-white mb-6 italic tracking-tight font-medium">
                                Secure Diagnostic Access
                            </h2>
                            <p className="text-slate-500 text-[10px] font-black uppercase tracking-[0.4em] mb-16">
                                Strategic Transformations Portal
                            </p>
                            
                            <div className="max-w-md mx-auto space-y-6">
                                <input 
                                    type="text" 
                                    value={inputValue} 
                                    onChange={(e) => setInputValue(e.target.value)} 
                                    placeholder="......" 
                                    className={`w-full bg-slate-900/40 border ${error ? 'border-red-500/50' : 'border-white/5'} rounded-2xl px-6 py-8 text-white text-center text-2xl font-mono focus:border-blue-500/40 outline-none transition-all placeholder:text-slate-800 shadow-2xl`}
                                    onKeyDown={(e) => { if (e.key === 'Enter') handleAuthenticate(); }} 
                                />
                                {error && <p className="text-red-400 text-[10px] font-bold uppercase tracking-widest mt-2">{error}</p>}
                                <button 
                                    onClick={handleAuthenticate} 
                                    className="w-full bg-[#163d8d] hover:bg-[#1e4eb0] text-white font-black py-6 rounded-2xl shadow-2xl uppercase tracking-[0.2em] text-sm transition-all active:scale-95"
                                >
                                    Authenticate Session
                                </button>
                            </div>

                            <footer className="mt-32 opacity-40">
                                <p className="text-[10px] text-slate-500 uppercase tracking-[0.2em] leading-relaxed font-bold">
                                    THIS DIAGNOSTIC ENGINE IS PROPRIETARY IP. <br/> UNAUTHORIZED ACCESS IS PROHIBITED.
                                </p>
                            </footer>
                        </div>
                    </div>
                );
            }

            // --- DASHBOARD VIEW ---
            return (
                <div className="min-h-screen bg-[#070e24] text-white flex flex-col font-urbanist selection:bg-teal-500/30">
                    <header className="border-b border-white/5 bg-[#0f172a]/40 backdrop-blur-xl sticky top-0 z-50 p-6 no-print">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-14">
                                <BrandLogo />
                                <div>
                                    <h1 className="text-2xl font-lora font-bold uppercase tracking-tighter leading-none">
                                        UNMASK <span className="text-teal-400 italic font-light lowercase text-xl">diagnostic</span>
                                    </h1>
                                    <p className="text-[9px] text-white/30 font-black uppercase tracking-[0.4em] mt-2 italic">Client_Ref: {auditId}</p>
                                </div>
                            </div>
                            <div className="hidden sm:flex items-center gap-3 bg-teal-500/5 px-4 py-2 rounded-full border border-teal-500/10">
                                <div className="h-1.5 w-1.5 rounded-full bg-teal-400 animate-pulse glow-teal" />
                                <span className="text-[9px] font-black uppercase tracking-widest text-teal-400">Secure Live Stream</span>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto w-full p-6 lg:p-12 grid grid-cols-1 lg:grid-cols-12 gap-12 flex-grow">
                        {/* Executive Summary Left */}
                        <div className="lg:col-span-4 space-y-8">
                            <div className="glass rounded-[3rem] p-10 shadow-2xl">
                                <h2 className="text-4xl font-lora italic text-white/90 mb-10 border-b border-white/5 pb-8 tracking-tighter font-medium">The Briefing</h2>
                                
                                <div className="space-y-12">
                                    <div className="bg-black/20 p-8 rounded-[2.5rem] border border-white/5 shadow-inner">
                                        <div className="flex justify-between items-center mb-6">
                                            <span className="text-[10px] font-black text-white/20 uppercase tracking-[0.3em]">Load-Path Efficiency</span>
                                            <div className="h-1.5 w-1.5 rounded-full bg-teal-400 animate-pulse" />
                                        </div>
                                        <div className="text-7xl font-black text-white tracking-tighter mb-4 leading-none">
                                            {auditData?.loadPathEfficiency || 88}%
                                        </div>
                                        <p className="text-xs text-white/40 leading-relaxed italic font-lora font-light">Structural integrity of decision paths across hierarchy.</p>
                                    </div>

                                    <div className="bg-teal-500/5 p-8 rounded-3xl border border-teal-500/10 text-center">
                                        <p className="text-[10px] font-black text-teal-400 uppercase tracking-widest mb-4">Diagnostic Verdict</p>
                                        <p className="text-2xl font-lora italic text-white/80 leading-snug font-medium">
                                            {auditData?.totalStrainScore > 3.5 ? 'System Fragmented.' : 'Integrity Stable.'}
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Audit Sliders Right */}
                        <div className="lg:col-span-8 glass rounded-[3.5rem] p-8 lg:p-16 relative overflow-hidden shadow-2xl">
                            <div className="flex flex-col md:flex-row md:items-baseline justify-between mb-24 gap-8 border-b border-white/5 pb-14">
                                <h2 className="text-6xl font-lora text-white italic tracking-tighter font-medium">Structural Audit</h2>
                                <div className="text-center md:text-right">
                                    <p className="text-[11px] text-white/20 font-black tracking-[0.6em] uppercase mb-2">Aggregate Strain</p>
                                    <div className="text-8xl font-black text-teal-400 tracking-tighter leading-none drop-shadow-[0_0_20px_rgba(45,212,191,0.4)]">
                                        {(auditData?.totalStrainScore || 0).toFixed(2)}
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-20">
                                {[
                                    { k: "authorityAlignment", l: "Authority Alignment", s: "Responsibility vs power gap." },
                                    { k: "operationalSqueeze", l: "Operational Squeeze", s: "Output Load vs capacity limit." },
                                    { k: "maskingDensity", l: "Masking Density", s: "Energy lost to theater." },
                                    { k: "escalationDensity", l: "Escalation Density", s: "Decision path friction." }
                                ].map((f) => (
                                    <div key={f.k} className="group">
                                        <div className="flex justify-between items-end mb-6">
                                            <div>
                                                <h3 className="text-xl font-black uppercase tracking-widest text-white/90 leading-none mb-3 group-hover:text-teal-400 transition-colors">{f.l}</h3>
                                                <p className="text-[11px] font-lora italic text-white/30">{f.s}</p>
                                            </div>
                                            <div className="text-5xl font-black text-teal-400 tracking-tighter leading-none">
                                                {(auditData?.[f.k] || 0).toFixed(1)}
                                            </div>
                                        </div>
                                        <div className="h-3.5 bg-black/40 rounded-full border border-white/5 p-[3px] overflow-hidden shadow-inner">
                                            <div className="h-full bg-gradient-to-r from-teal-600 via-teal-400 to-cyan-400 rounded-full transition-all duration-[2000ms] ease-out shadow-[0_0_20px_rgba(45,212,191,0.3)]" 
                                                 style={{ width: `${Math.min(((auditData?.[f.k] || 0) / 5) * 100, 100)}%` }} />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>

                    <footer className="bg-white/5 border-t border-white/5 py-24 px-6 text-center mt-20 no-print">
                        <div className="max-w-3xl mx-auto space-y-12">
                            <h2 className="text-4xl font-lora italic text-white/80 font-light">Shift from managing symptoms to redesigning architecture.</h2>
                            <div className="flex flex-col sm:flex-row items-center justify-center gap-8">
                                <a href="https://strategictransformations.com/book" className="bg-white text-[#070e24] px-14 py-6 rounded-2xl font-black text-[10px] uppercase tracking-[0.3em] shadow-2xl hover:bg-teal-400 transition-all active:scale-95">
                                    BOOK RECALIBRATION
                                </a>
                                <button onClick={() => window.print()} className="text-white/20 hover:text-white font-black uppercase tracking-[0.4em] text-[10px] transition-all">
                                    EXPORT AUDIT PDF
                                </button>
                            </div>
                            <p className="text-[9px] text-white/5 font-black tracking-[1em] uppercase pt-16 font-urbanist">&copy; 2026 STRATEGIC TRANSFORMATIONS</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
