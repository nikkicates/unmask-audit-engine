<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Transformations | Portal</title>
    
    <!-- High-End Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #070e24; font-family: 'Urbanist', sans-serif; margin: 0; overflow-x: hidden; }
        .font-lora { font-family: 'Lora', serif; }
        .hex { clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- 1. CONFIGURATION (PASTE YOUR API KEY HERE) ---
        const firebaseConfig = {
            apiKey: "AIzaSyBG4228evDP211fvJv1LMSt0AZ8a8kj31c", 
            authDomain: "unmask-audit-2026.firebaseapp.com",
            projectId: "unmask-audit-2026",
            storageBucket: "unmask-audit-2026.firebasestorage.app",
            messagingSenderId: "94518937589",
            appId: "1:94518937589:web:a484d36bf7a11ffe9a82bc"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const { useState, useEffect } = React;

        const BrandLogo = ({ size = "md" }) => {
            const containerClass = size === "lg" ? "scale-[1.8] mb-24" : "scale-100";
            const hexSize = size === "lg" ? "w-6 h-6" : "w-3 h-3";
            return (
                <div className={`relative flex items-center justify-center ${containerClass}`}>
                    <div className="relative">
                        <div className={`${hexSize} bg-teal-400 hex absolute -top-4 left-1/2 -translate-x-1/2`} />
                        <div className={`${hexSize} bg-purple-600 hex absolute top-1 -left-4`} />
                        <div className={`${hexSize} bg-white hex absolute top-1 -right-4 flex items-center justify-center p-[2px]`}>
                             <div className="w-full h-full bg-[#064680] hex flex items-center justify-center"><div className="w-1/2 h-1/2 bg-teal-400 hex" /></div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [loading, setLoading] = useState(true);
            const [auditData, setAuditData] = useState(null);
            const [error, setError] = useState(null);
            const [inputValue, setInputValue] = useState('');
            const [authState, setAuthState] = useState('Connecting...');
            const [auditId, setAuditId] = useState(new URLSearchParams(window.location.search).get('id'));

            useEffect(() => {
                const init = async () => {
                    if (firebaseConfig.apiKey.includes("YOUR_API")) {
                        setError("ACTION REQUIRED: You must paste your API Key into the index.html file.");
                        setLoading(false);
                        return;
                    }

                    auth.onAuthStateChanged(async (user) => {
                        if (!user) {
                            setAuthState('Authenticating...');
                            await auth.signInAnonymously().catch(e => {
                                setError(`Auth Error: ${e.message}. (Check if Anonymous Auth is enabled in Firebase)`);
                                setAuthState('Auth Failed');
                            });
                        } else {
                            setAuthState('Secure Link Established');
                        }

                        if (user && auditId) {
                            setAuthState(`Fetching Data for: ${auditId}`);
                            // EXACT PATH MATCHING YOUR SCREENSHOT
                            const path = `artifacts/unmask-audit-2026/public/data/structural_audits/${auditId.trim()}`;
                            
                            const unsubscribe = db.doc(path).onSnapshot((snap) => {
                                if (snap.exists) {
                                    setAuditData(snap.data());
                                    setError(null);
                                    setAuthState('Stream Active');
                                } else {
                                    setError(`ID NOT RECOGNIZED: We couldn't find a report for "${auditId}". Check your spelling in Firestore.`);
                                }
                                setLoading(false);
                            }, (err) => {
                                setError(`Database Access Denied: ${err.message}. (Check your Firestore Rules)`);
                                setLoading(false);
                            });
                            return () => unsubscribe();
                        } else {
                            setLoading(false);
                        }
                    });
                };
                init();
            }, [auditId]);

            const handleGo = () => {
                if (inputValue.trim()) {
                    window.location.search = `?id=${inputValue.trim().toUpperCase()}`;
                }
            };

            if (loading) return (
                <div className="min-h-screen bg-[#070e24] flex flex-col items-center justify-center text-teal-400 gap-4">
                    <div className="w-8 h-8 border-4 border-teal-500 border-t-transparent rounded-full animate-spin"></div>
                    <p className="text-[10px] uppercase tracking-widest opacity-40">{authState}</p>
                </div>
            );

            if (error) return (
                <div className="min-h-screen bg-[#070e24] flex items-center justify-center p-6 text-white text-center">
                    <div className="max-w-xl w-full bg-[#161d31] border border-red-400/20 rounded-[2.5rem] p-12 shadow-2xl">
                        <h2 className="text-2xl font-lora italic mb-6">System Access Alert</h2>
                        <div className="bg-black/20 p-6 rounded-2xl mb-8 font-mono text-red-300 text-xs break-all leading-relaxed">{error}</div>
                        <button onClick={() => window.location.search = ''} className="text-teal-400 font-black uppercase text-[10px] tracking-widest hover:text-white">Restart Engine</button>
                    </div>
                </div>
            );

            if (!auditId) return (
                <div className="min-h-screen bg-[#070e24] flex flex-col items-center justify-center p-6 text-center">
                    <BrandLogo size="lg" />
                    <h2 className="text-4xl lg:text-5xl font-lora text-white mb-6 italic">Secure Diagnostic Access</h2>
                    <p className="text-slate-500 text-[11px] font-black uppercase tracking-[0.4em] mb-16">Strategic Transformations Portal</p>
                    <div className="max-w-md w-full space-y-5">
                        <input 
                            type="text" value={inputValue} onChange={(e) => setInputValue(e.target.value)} 
                            placeholder="Enter Report ID" 
                            className="w-full bg-[#161d31] border border-white/5 rounded-2xl px-6 py-8 text-white text-center text-xl uppercase tracking-widest outline-none focus:border-blue-500/50 transition-all"
                            onKeyDown={(e) => { if (e.key === 'Enter') handleGo(); }} 
                        />
                        <button onClick={handleGo} className="w-full bg-[#163d8d] hover:bg-[#1e4eb0] text-white font-black py-6 rounded-2xl shadow-xl uppercase tracking-widest text-sm transition-all active:scale-95">
                            Authenticate Session
                        </button>
                    </div>
                    <p className="mt-12 text-[9px] text-white/10 uppercase tracking-widest">{authState}</p>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#064680] text-white flex flex-col font-urbanist">
                    <header className="border-b border-white/10 bg-[#04325c]/50 p-6 flex items-center justify-between">
                        <div className="flex items-center gap-10">
                            <BrandLogo />
                            <div>
                                <h1 className="text-xl font-lora font-bold uppercase">UNMASK <span className="text-teal-400 italic lowercase text-lg">Diagnostic</span></h1>
                                <p className="text-[10px] text-white/40 font-black uppercase tracking-[0.4em] mt-2 italic">Client_Ref: {auditId}</p>
                            </div>
                        </div>
                        <div className="hidden sm:flex items-center gap-2 bg-teal-500/10 px-4 py-2 rounded-full border border-teal-500/20">
                            <div className="h-1.5 w-1.5 rounded-full bg-teal-400 animate-pulse" />
                            <span className="text-[9px] font-black uppercase tracking-widest text-teal-400">Live Secure Stream</span>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-6 py-20 w-full grid lg:grid-cols-12 gap-20">
                        <div className="lg:col-span-7 space-y-16">
                            {[
                                { k: "authorityAlignment", l: "Authority Alignment" },
                                { k: "operationalSqueeze", l: "Operational Squeeze" },
                                { k: "maskingDensity", l: "Masking Density" },
                                { k: "escalationDensity", l: "Escalation Density" }
                            ].map((f) => (
                                <div key={f.k}>
                                    <div className="flex justify-between items-end mb-6">
                                        <h3 className="text-xl font-black uppercase tracking-widest">{f.l}</h3>
                                        <div className="text-5xl font-black text-teal-400">{(auditData?.[f.k] || 0).toFixed(1)}</div>
                                    </div>
                                    <div className="h-3 bg-black/20 rounded-full border border-white/5 overflow-hidden">
                                        <div className="h-full bg-teal-400 transition-all duration-[2000ms]" style={{ width: `${Math.min(((auditData?.[f.k] || 0) / 5) * 100, 100)}%` }} />
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="lg:col-span-5 bg-[#04325c] p-12 rounded-[3.5rem] border border-white/10 shadow-2xl text-center relative overflow-hidden">
                            <h2 className="text-xl font-lora italic text-white/60 mb-10 uppercase tracking-widest">Aggregate Strain</h2>
                            <div className="text-9xl font-black text-teal-400 tracking-tighter leading-none mb-10 drop-shadow-2xl">
                                {(auditData?.totalStrainScore || 0).toFixed(2)}
                            </div>
                            <div className="bg-white/5 p-8 rounded-[2rem] border border-white/5 italic font-lora text-white/70 text-lg leading-relaxed">
                                {auditData?.totalStrainScore > 3.5 ? 
                                    "Critical strain detected in structural load-paths. Redesign required." : 
                                    "Structural integrity remains within stable parameters."}
                            </div>
                        </div>
                    </main>

                    <footer className="py-24 text-center">
                        <a href="https://strategictransformations.com/book" className="inline-flex bg-white text-[#064680] px-12 py-5 rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-teal-400 transition-all shadow-2xl">
                            Book Discovery with Nikki Cates
                        </a>
                    </footer>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
